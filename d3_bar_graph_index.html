<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spotify Audio Features by Genre</title>
  <script src="https://d3js.org/d3.v7.min.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
    }

    #tooltip {
      position: absolute;
      opacity: 0;
      pointer-events: none;
      background: white;
      border: 1px solid #ccc;
      padding: 8px;
      border-radius: 4px;
      font-size: 12px;
    }

    #controls {
      margin-bottom: 12px;
    }
  </style>
</head>
<body>
<div id="controls">
  <label for="sortFeature"><strong>Show / sort by:</strong></label>
  <select id="sortFeature">
    <option value="all" selected>All features</option>
    <option value="danceability_norm">Danceability</option>
    <option value="energy_norm">Energy</option>
    <option value="valence_norm">Valence</option>
    <option value="acousticness_norm">Acousticness</option>
  </select>
</div>

  <div id="chart"></div>
  <div id="tooltip"></div>

  <script src="d3_bar_graph.js"></script>
</body>
</html>
